[package]
name = "cairn-core"
version = "0.1.0"
edition = "2021"
description = "Core business logic library for Cairn - no Tauri dependency"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
diesel = { version = "2.2", features = ["sqlite", "returning_clauses_for_sqlite_3_35"] }
diesel_migrations = "2.2"
uuid = { version = "1.0", features = ["v4", "serde"] }
regex = "1"
evalexpr = "11"
reqwest = { version = "0.12", features = ["json"] }
tokio = { version = "1", features = ["time", "rt", "macros", "sync", "net", "process"] }
portable-pty = "0.8"
log = "0.4"
nix = { version = "0.29", features = ["signal"] }
chrono = { version = "0.4", features = ["serde"] }
dirs = "5"
serde_yaml = "0.9"
json5 = "0.4"
base64 = "0.22"
rand = "0.8"
axum = { version = "0.8", features = ["ws"] }
axum-extra = { version = "0.10", features = ["typed-header"] }
cairn-common = { path = "../cairn-common" }
tempfile = "3"

# Optional: test utilities (mocking)
mockall = { version = "0.13", optional = true }

[dev-dependencies]
mockall = "0.13"
serde_json = "1.0"
tempfile = "3"

[features]
test-utils = ["dep:mockall"]
